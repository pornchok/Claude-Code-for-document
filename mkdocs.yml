site_name: QA Learning Hub
site_description: คอร์ส QA & Automation Testing ภาษาไทย
site_url: https://pornchok.github.io/Claude-Code-for-document/
repo_url: https://github.com/pornchok/Claude-Code-for-document
repo_name: pornchok/Claude-Code-for-document

docs_dir: docs
site_dir: site

theme:
  name: material
  language: th
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: en

